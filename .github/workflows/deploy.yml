name: CI — Build & Health Check

# Railway watches the GitHub repo and auto-deploys on push to main.
# This workflow's job is to catch broken builds BEFORE Railway picks them up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-check:
    name: Install, Build & Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install server dependencies
        run: npm install --prefix server

      - name: Install client dependencies
        run: npm install --prefix client

      - name: Build client (Vite)
        run: npm run build

      - name: Start server and verify health endpoint
        run: |
          node server/server.js &
          SERVER_PID=$!
          # Give the server a few seconds to start and seed the DB
          sleep 4
          # Health check must return {"status":"ok",...}
          curl --fail --silent http://localhost:3001/api/health | grep -q '"status":"ok"'
          echo "✅ Health check passed"
          kill $SERVER_PID
