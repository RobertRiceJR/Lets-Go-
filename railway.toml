[build]
# Install all three package.json layers, then build the Vite client.
buildCommand = "npm install && npm install --prefix server && npm install --prefix client && npm run build"

[deploy]
startCommand = "npm start"

# Railway uses this endpoint to confirm the app booted successfully.
# If this path returns a non-2xx after deploy, Railway marks it as failed.
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# Restart the app automatically on crash (not on user-initiated redeploys).
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
